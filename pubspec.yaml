name: orca_sim
description: "Gerenciador de orçamentos para prestadores de serviço."
publish_to: "none"
version: 1.1.0+4

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  brasil_fields: ^1.15.0
  cloud_firestore: ^5.0.0
  cupertino_icons: ^1.0.6
  firebase_auth: ^5.0.0
  firebase_core: ^3.0.0
  flutter:
    sdk: flutter
  get_it: ^8.0.3
  google_sign_in: ^6.2.1
  image_picker: ^1.1.0
  intl: ^0.19.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.10.0
  printing: ^5.11.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.3.1
  flutter_test:
    sdk: flutter

# 1. ÍCONE DO APLICATIVO
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icone_app.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icone_novo.png"

# 2. TELA DE ABERTURA NATIVA
flutter_native_splash:
  color: "#000000"
  color_dark: "#000000"
  android_12:
    color: "#000000"
    icon_background_color: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/
